name: Send monthly skipped dates email

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  send-monthly-email:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_TO_ADDRESS: ${{ secrets.REPORT_TO_ADDRESS }}
      REPORT_SENDER_NAME: ${{ secrets.REPORT_SENDER_NAME }}
      REPORT_CC_ADDRESS: ${{ secrets.REPORT_CC_ADDRESS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install script dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Send monthly skipped dates email
        run: |
          set -euo pipefail
          python -m scripts.send_email_with_skipped_dates
